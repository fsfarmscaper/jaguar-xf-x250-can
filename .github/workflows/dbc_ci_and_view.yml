name: DBC Web UI Builder

on:
  push:
    branches: [ main ]
    paths:
      - "**.dbc"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install cantools

      - name: Validate DBC syntax
        run: |
          for file in $(find . -name "*.dbc"); do
            python -m cantools dump "$file" > /dev/null
          done

      - name: Build DBC JSON
        run: |
          mkdir -p web
          python - << 'EOF'
import cantools, json, glob

dbcs = glob.glob("**/*.dbc", recursive=True)

msgs = []

for f in dbcs:
    db = cantools.database.load_file(f)
    for m in db.messages:
        msgs.append({
            "name": m.name,
            "id": m.frame_id,
            "len": m.length,
            "signals": [
                {
                    "name": s.name,
                    "start": s.start,
                    "length": s.length,
                    "scale": s.scale,
                    "offset": s.offset
                } for s in m.signals
            ]
        })

with open("web/dbc.json", "w") as f:
    json.dump(msgs, f, indent=2)
EOF

      - name: Create Web UI
        run: |
          mkdir -p web

          cat > web/index.html << 'EOF'
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>CAN DBC Viewer</title>
</head>
<body>
<h2>CAN Decoder</h2>

<textarea id="in" style="width:100%;height:120px;"></textarea>
<br>
<button onclick="decode()">Decode</button>

<pre id="out"></pre>

<script src="app.js"></script>
</body>
</html>
EOF

          cat > web/app.js << 'EOF'
let dbc = [];

fetch("dbc.json")
  .then(r => r.json())
  .then(d => dbc = d);

function decode() {
  const line = document.getElementById("in").value;
  const parts = line.split(",");

  const id = parseInt(parts[1], 16);
  const data = parts.slice(6, 14).map(x => parseInt(x, 16));

  const msg = dbc.find(m => m.id === id);

  const out = document.getElementById("out");

  if (!msg) {
    out.textContent = "Unknown frame 0x" + id.toString(16);
    return;
  }

  out.textContent =
    "Frame: " + msg.name + "\n" +
    "ID: 0x" + id.toString(16) + "\n" +
    "Bytes: " + data.join(" ");
}
EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
